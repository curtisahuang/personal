<!doctype html>
<html lang="en" data-theme="win98">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Curtis's Curious Compendium</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lavishly+Yours&family=Honk&family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="bg-synthwave" aria-hidden="true"></div>
    <header class="site-header">
      <div class="wrap">
        <h1 class="brand">Curtis's Curious Compendium</h1>
        <!-- No inline theme buttons; launchers are placed elsewhere per theme -->
      </div>
    </header>

    <!-- Geocities banner (only visible in Geocities theme) -->
    <div class="geo-banner" aria-hidden="true">
      <div class="geo-banner-inner">
        <span class="geo-badge">Under Construction</span>
        <span class="geo-badge">Best viewed in Netscape</span>
        <span class="geo-badge">Sign my Guestbook!</span>
        <div class="geo-marquee">
          <span
            >Welcome to my homepage!!! Thanks for visiting! Hit refresh for more sparkles!
          </span>
        </div>
      </div>
    </div>

    <main class="site-main">
      <div class="wrap">
        <section id="filters" class="filters" hidden aria-label="Filter by tags">
          <div class="chips" role="toolbar" aria-label="Tag filters"></div>
        </section>

        <section id="grid" class="grid" aria-live="polite"></section>
        <p id="empty" class="empty" hidden>
          No curiosities yet. Add entries to <code>assets/curiosities.json</code>.
        </p>
      </div>

      <section id="win98Desktop" aria-label="Windows 98 desktop">
        <button id="win98ExplorerShortcut" class="win98-shortcut" type="button">
          <span class="win98-shortcut-icon" aria-hidden="true">📁</span>
          <span class="win98-shortcut-label">Curiosities</span>
        </button>

        <section id="win98ExplorerWindow" class="win98-window" hidden aria-label="Explorer window">
          <header id="win98ExplorerTitlebar" class="win98-window-titlebar">
            <span class="win98-window-title">Curiosities Explorer</span>
            <span class="win98-window-controls">
              <button
                id="win98ExplorerMaximize"
                class="win98-window-control"
                type="button"
                aria-label="Maximize Explorer"
                title="Maximize"
              >
                □
              </button>
              <button
                id="win98ExplorerClose"
                class="win98-window-close win98-window-control"
                type="button"
                aria-label="Close Explorer"
                title="Close"
              >
                ×
              </button>
            </span>
          </header>
          <div class="win98-window-toolbar">C:\Curiosities</div>
          <div id="win98FileArea" class="win98-file-area" aria-label="Curiosity files"></div>
          <span class="win98-resize-handle win98-resize-nw" data-dir="nw" aria-hidden="true"></span>
          <span class="win98-resize-handle win98-resize-ne" data-dir="ne" aria-hidden="true"></span>
          <span class="win98-resize-handle win98-resize-sw" data-dir="sw" aria-hidden="true"></span>
          <span class="win98-resize-handle win98-resize-se" data-dir="se" aria-hidden="true"></span>
        </section>

        <div id="win98ContextMenu" class="win98-context-menu" hidden>
          <button id="win98CtxVisitSite" type="button">Visit Site</button>
          <button id="win98CtxVisitGithub" type="button">Visit GitHub</button>
        </div>
      </section>
    </main>

    <button id="homeBackBtn" class="home-back-btn" type="button" aria-label="Back to homepage">
      ← Back
    </button>

    <footer class="site-footer">
      <div class="wrap">
        <small>&copy; 2025 Curtis</small>
      </div>
    </footer>

    <!-- Win98 Taskbar (visible only in Win98 theme) -->
    <div class="win98-taskbar win98-only" role="toolbar" aria-label="Windows 98 taskbar">
      <button
        id="winStartBtn"
        class="win-start-btn"
        aria-haspopup="true"
        aria-controls="winStartMenu"
        title="Start"
      >
        Start
      </button>
      <div class="taskbar-spacer" aria-hidden="true"></div>
      <span id="winClock" class="win-clock" aria-live="polite" aria-atomic="true"></span>
    </div>

    <!-- Dark theme hamburger (visible only in Dark theme) -->
    <button
      id="themeMenuBtn"
      class="theme-menu-btn dark-only"
      aria-haspopup="true"
      aria-controls="themeMenu"
      title="Themes"
      aria-label="Open theme menu"
    >
      <span class="hamburger" aria-hidden="true"></span>
    </button>
    <div id="themeMenu" class="theme-menu dark-menu" hidden>
      <button type="button" data-theme="dark">Synthwave</button>
      <button type="button" data-theme="homepage">Default</button>
      <button type="button" data-theme="win98">Windows 98</button>
      <button type="button" data-theme="geocities">Geocities</button>
    </div>

    <!-- Win98 Start menu -->
    <div id="winStartMenu" class="theme-menu win98-menu" hidden>
      <button type="button" data-theme="dark">Synthwave</button>
      <button type="button" data-theme="homepage">Default</button>
      <button type="button" data-theme="win98">Windows 98</button>
      <button type="button" data-theme="geocities">Geocities</button>
      <button type="button" data-action="go-home">Shut down and go back</button>
    </div>

    <!-- Geocities launcher -->
    <button
      id="geoThemeBtn"
      class="geo-theme-btn geocities-only"
      aria-haspopup="true"
      aria-controls="geoThemeMenu"
      title="THEMEZ"
    >
      THEMEZ
    </button>
    <div id="geoThemeMenu" class="theme-menu geocities-menu" hidden>
      <button type="button" data-theme="dark">Synthwave</button>
      <button type="button" data-theme="homepage">Default</button>
      <button type="button" data-theme="win98">Windows 98</button>
      <button type="button" data-theme="geocities">Geocities</button>
    </div>

    <script>
      window.INSTANT_SITE_DOMAIN = "cosine";
    </script>
    <script src="assets/script.js"></script>
  </body>
</html>
